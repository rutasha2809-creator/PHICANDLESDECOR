<!doctype html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Контакты — PHICANDLES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header class="header fixed-header">
        <nav class="container nav">
            <div class="logo">PHICANDLES</div>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="collaboration.html">Сотрудничество</a>
                <a href="contacts.html">Контакты</a>
            </div>
        </nav>
    </header>
    <main class="container">
        <h1>Контакты</h1>
        <p>Email: contact@phicandles.com</p>
        <h2>Форма обратной связи</h2>
        <form action="mailto:contact@phicandles.com" method="post" enctype="text/plain">
            <label>Имя:</label><br>
            <input type="text" name="name"><br>
            <label>Сообщение:</label><br>
            <textarea name="message"></textarea><br>
            <button type="submit">Отправить</button>
        </form>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">PHICANDLES</div>
                <div class="footer-social">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-telegram"></i></a>
                    <a href="#"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© PHICANDLES. Премиальные свечи из соевого воска.</p>
                <div class="legal-links">
                    <a href="cookie.html">Политика конфиденциальности</a>
                    <a href="cookie.html">Пользовательское соглашение</a>
                </div>
            </div>
        </div>
    </footer>
    <div id="cookie-container"></div>
    <script>
        // Загрузка cookie-уведомления
        fetch('cookie.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('cookie-container').innerHTML = data;
                const cookieAccepted = localStorage.getItem('cookieAccepted');
                if (cookieAccepted) {
                    const cookieWarning = document.getElementById('cookie-warning');
                    if (cookieWarning) cookieWarning.style.display = 'none';
                }
            });

        // Фиксированное меню при прокрутке
        window.addEventListener('scroll', function () {
            const header = document.querySelector('.header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>

</html>
